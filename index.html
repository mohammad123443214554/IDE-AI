<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aperonix AI | By Mohammad Khan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Themes Definition */
        .night-sky { --bg: #000000; --panel: #0a0a0a; --text: #ffffff; --accent: #3b82f6; }
        .aquatic { --bg: #001f3f; --panel: #002b55; --text: #e0f2fe; --accent: #06b6d4; }
        .desert { --bg: #fdf6e3; --panel: #eee8d5; --text: #657b83; --accent: #b58900; }
        .dusk { --bg: #1a1a1b; --panel: #2d2d2e; --text: #d7dadc; --accent: #ff4500; }

        body { background-color: var(--bg); color: var(--text); transition: 0.4s; }
        .glass-panel { background-color: var(--panel); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="night-sky h-screen flex flex-col overflow-hidden font-sans">

    <nav class="p-4 glass-panel flex justify-between items-center px-6">
        <div class="flex items-center gap-4">
            <span class="text-2xl font-black tracking-tighter text-blue-500">APERONIX AI</span>
        </div>
        <div class="flex items-center gap-4">
            <select onchange="document.body.className = this.value" class="bg-gray-800 text-xs p-2 rounded-lg border border-gray-700 outline-none">
                <option value="night-sky">Night Sky (Dark Black)</option>
                <option value="aquatic">Aquatic (Dark Blue)</option>
                <option value="dusk">Dusk (Light Black)</option>
                <option value="desert">Desert (Light White)</option>
            </select>
            <span class="text-sm font-medium opacity-70">Mohammad Khan</span>
        </div>
    </nav>

    <main class="flex-1 overflow-y-auto p-6 flex flex-col items-center">
        <div id="chat-box" class="w-full max-w-4xl space-y-6">
            <div class="glass-panel p-4 rounded-2xl max-w-[85%] self-start">
                <p class="text-sm">Hello Mohammad! Main **Aperonix AI** hoon. Main aapke liye code likh sakta hoon aur images bhi generate kar sakta hoon. <br><br> Aapka AdSense setup bhi check kar liya hai, sab sahi chal raha hai!</p>
            </div>
        </div>
    </main>

    <footer class="p-6 bg-gradient-to-t from-black/50 to-transparent">
        <div class="max-w-4xl mx-auto flex flex-col gap-3">
            <div class="flex gap-2">
                <button onclick="alert('Image Generation Activated')" class="text-[11px] bg-purple-600/20 text-purple-400 border border-purple-500/30 px-4 py-1.5 rounded-full hover:bg-purple-600/40 transition">Create Image 🎨</button>
                <button onclick="alert('Code Mode Activated')" class="text-[11px] bg-blue-600/20 text-blue-400 border border-blue-500/30 px-4 py-1.5 rounded-full hover:bg-blue-600/40 transition">Write Code 💻</button>
            </div>
            <div class="relative">
                <input type="text" placeholder="Type your message here..." class="w-full bg-gray-900 border border-gray-700 rounded-2xl p-4 pr-14 focus:outline-none focus:border-blue-500 transition shadow-xl">
                <button class="absolute right-4 top-4 text-blue-500 hover:scale-110 transition">➤</button>
            </div>
            <div class="flex justify-between items-center mt-2 px-2">
                <p class="text-[10px] opacity-40 uppercase tracking-widest">© 2026 Aperonix AI - Mohammad Khan</p>
                <div class="flex gap-4 text-[10px] opacity-40">
                    <a href="#" class="hover:opacity-100">Privacy</a>
                    <a href="#" class="hover:opacity-100">Terms</a>
                </div>
            </div>
        </div>
    </footer>

</body>
</html>
