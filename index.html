<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDE AI - Prompt to Website Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex flex-col min-h-screen font-sans">

    <header class="flex justify-between items-center p-4 bg-gray-800 border-b border-gray-700 shadow-md">
        <div class="flex items-center gap-3">
            <img src="logo.png" alt="IDE AI Logo" class="h-10 w-10 rounded-lg object-cover bg-gray-700">
            <span class="text-2xl font-extrabold tracking-wide text-blue-400">IDE AI</span>
        </div>
        
        <div class="hidden md:flex items-center justify-center bg-gray-700 text-gray-400 text-sm h-12 w-72 rounded border border-dashed border-gray-500">
            Google AdSense Space (728x90)
        </div>
        
        <button class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded transition">
            Publish Web
        </button>
    </header>

    <main class="flex-grow flex flex-col p-4 md:p-6 gap-4">
        
        <div class="bg-gray-800 p-2 rounded-xl shadow-lg border border-gray-700 flex gap-2">
            <input type="text" id="promptInput" 
                   placeholder="Aapko kaisi website banani hai? (e.g., Ek modern gym ki landing page...)" 
                   class="flex-grow p-4 rounded-lg bg-gray-900 text-white border-none focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg">
            <button id="generateBtn" class="bg-blue-600 hover:bg-blue-700 px-8 py-4 rounded-lg font-bold text-lg transition flex items-center gap-2">
                Generate 🚀
            </button>
        </div>

        <div class="flex-grow bg-white rounded-xl overflow-hidden border-4 border-gray-700 relative shadow-2xl flex flex-col">
            <div class="bg-gray-800 p-2 border-b border-gray-700 flex justify-between items-center text-xs text-gray-400">
                <span>Live Preview Window</span>
                <span class="bg-gray-700 px-2 py-1 rounded">ide-ai.preview</span>
            </div>
            
            <iframe id="previewFrame" class="w-full h-full flex-grow bg-white" 
                    srcdoc="<div style='display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif; color:#666; background-color:#f9fafb;'>
                                <h2>Aapki generated website yahan live dikhegi...</h2>
                            </div>">
            </iframe>
        </div>
    </main>

    <footer class="bg-gray-800 text-center p-4 text-sm text-gray-400 border-t border-gray-700">
        &copy; 2026 IDE AI. Founded by Mohammad Khan. All rights reserved.
    </footer>

</body>
</html>
